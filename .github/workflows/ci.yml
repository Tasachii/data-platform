name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Generate sample data (3 days, small volume for CI speed)
        run: python generator/generate_orders.py --days 3 --orders-per-day 2000

      - name: Run orders pipeline
        run: python pipelines/orders/run_pipeline.py --all

      - name: Run test suite
        run: pytest tests/ -v
