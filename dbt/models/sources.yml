version: 2

sources:
  - name: raw
    description: >
      Untyped landing zone. The ingest step (pipelines/orders/ingest.py) loads
      daily CSVs here verbatim — all VARCHAR — so the source's dirt survives
      long enough to be cleaned deliberately, with rejects quarantined.
    schema: raw
    tables:
      - name: orders
        description: One row per order VERSION as emitted by the source (resends and retro status updates included).
      - name: order_items
      - name: products
      - name: customers
      - name: ad_performance
        description: Unified ad rows from the platform connectors (FB ad grain, Google/TikTok campaign grain); values still raw strings.
      - name: utm_touches
        description: order_id ↔ dirty utm_source/utm_campaign; organic orders carry NULLs.
      - name: fx_rates
        description: Daily USD→THB, one row per date in the marketing window.
