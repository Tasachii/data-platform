name: Link check

on:
  push:
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — catches external links that died since
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose "**/*.md"
          fail: true
