version: 2

models:
  - name: fct_channel_performance
    config:
      tags: [marketing]
    description: Daily spend/delivery vs attributed revenue per platform (+ organic).
    columns:
      - name: activity_date
        tests: [not_null]
      - name: platform
        tests:
          - not_null
          - accepted_values:
              values: [facebook, google, tiktok, organic]
      - name: spend_thb
        tests: [not_null]

  - name: fct_campaign_performance
    config:
      tags: [marketing]
    description: Cross-platform campaign rollup at canonical grain.
    columns:
      - name: canonical
        tests: [unique, not_null]
