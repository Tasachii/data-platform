# Single-node Airflow (LocalExecutor) + Postgres metadata DB.
# The repo is mounted at /opt/airflow/repo — DAGs, pipeline code, dbt project,
# raw files and the DuckDB warehouse all live there, same layout as local dev.
#
#   docker compose up -d           # UI at http://localhost:8080 (admin/admin)
#   docker compose run --rm airflow-scheduler \
#       airflow dags test orders_daily 2026-06-15   # run one full DAG in-process

x-airflow-common: &airflow-common
  build: .
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/repo/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    PYTHONPATH: /opt/airflow/repo
    PLATFORM_DB: /opt/airflow/repo/warehouse/platform.duckdb
    PLATFORM_RAW_DIR: /opt/airflow/repo/raw
  volumes:
    - .:/opt/airflow/repo
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    volumes:
      - postgres-db:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname Admin --lastname User --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db:
