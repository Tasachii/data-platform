version: 2

models:
  - name: int_order_status_history
    config:
      tags: [orders]
    description: SCD2 status intervals per order (valid_from / valid_to / is_current).
    columns:
      - name: order_id
        tests: [not_null]
      - name: valid_from
        tests: [not_null]

  - name: int_orders_enriched
    config:
      tags: [orders]
    description: Order grain, current state, enriched; business_date in Asia/Bangkok.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: business_date
        tests: [not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
